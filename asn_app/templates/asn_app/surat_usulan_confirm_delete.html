{% extends 'asn_app/base.html' %}

{% block title %}Hapus Surat Usulan{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h2>Hapus Surat Usulan</h2>
        </div>
        <div class="card-body">
            <p>Anda yakin ingin menghapus surat usulan dengan perihal: <strong>{{ surat_usulan.hal }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-end">
                    <a href="{% url 'surat_usulan_detail' surat_usulan.pk %}" class="btn btn-secondary me-2">Batal</a>
                    <button type="submit" class="btn btn-danger">Hapus</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
